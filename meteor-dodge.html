<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Meteor Dodge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
canvas{display:block;touch-action:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = Math.min(window.innerWidth, 430);
const H = canvas.height = window.innerHeight;

let player = {x:W/2, y:H*0.78, r:20};
let meteors=[], stars=[], particles=[];
let score=0, alive=true, frame=0;
let spawnRate=65, speed=2.8;
let touchX=W/2;
let shield=false, shieldTimer=0;
let bestScore=0;

for(let i=0;i<100;i++) stars.push({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.8+0.2,
  b:Math.random()*Math.PI*2,
  spd:0.006+Math.random()*0.014
});

function spawnMeteor(){
  meteors.push({
    x:Math.random()*W, y:-40,
    r:11+Math.random()*20,
    vy:speed+Math.random()*2,
    vx:(Math.random()-0.5)*2,
    rot:0, rotV:(Math.random()-0.5)*0.12,
    isPow: Math.random()<0.1
  });
}

function addPfx(x,y,col,n=12){
  for(let k=0;k<n;k++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*4,alpha:1,color:col,decay:0.025+Math.random()*0.025});
  }
}

function restart(){
  player={x:W/2,y:H*0.78,r:20};
  meteors=[];particles=[];
  score=0;alive=true;frame=0;spawnRate=65;speed=2.8;
  shield=false;shieldTimer=0;touchX=W/2;
}

canvas.addEventListener('mousemove',e=>{touchX=e.clientX - canvas.getBoundingClientRect().left;});
canvas.addEventListener('touchmove',e=>{e.preventDefault();touchX=e.touches[0].clientX - canvas.getBoundingClientRect().left;},{passive:false});
canvas.addEventListener('touchstart',e=>{if(!alive)restart();},{passive:false});
canvas.addEventListener('mousedown',()=>{if(!alive)restart();});

function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);

  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a0533');bg.addColorStop(1,'#0d1b4a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    s.b+=s.spd;
    ctx.globalAlpha=0.3+Math.sin(s.b)*0.45;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  if(alive){
    frame++;score++;
    shieldTimer=Math.max(0,shieldTimer-1);
    if(!shieldTimer)shield=false;
    if(frame%290===0){speed+=0.28;spawnRate=Math.max(18,spawnRate-5);}
    if(frame%spawnRate===0)spawnMeteor();
    player.x+=(touchX-player.x)*0.17;
    player.x=Math.max(player.r,Math.min(W-player.r,player.x));
  }

  // Meteors
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    m.y+=m.vy;m.x+=m.vx;m.rot+=m.rotV;
    if(m.y>H+60){meteors.splice(i,1);continue;}

    if(alive){
      const dx=m.x-player.x,dy=m.y-player.y;
      if(Math.sqrt(dx*dx+dy*dy)<m.r+player.r-8){
        if(m.isPow){
          shield=true;shieldTimer=350;
          addPfx(m.x,m.y,'#00e5ff',15);
          meteors.splice(i,1);continue;
        } else if(shield){
          shield=false;shieldTimer=0;
          addPfx(m.x,m.y,'#00e5ff',15);
          meteors.splice(i,1);continue;
        } else {
          alive=false;
          bestScore=Math.max(bestScore,Math.floor(score/10));
          addPfx(player.x,player.y,'#ff2d55',30);
        }
      }
    }

    ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.rot);
    if(m.isPow){
      ctx.shadowColor='#00e5ff';ctx.shadowBlur=16;
      ctx.fillStyle='#00e5ff';
    } else {
      const grd=ctx.createRadialGradient(0,0,2,0,0,m.r);
      grd.addColorStop(0,'#ff9800');grd.addColorStop(0.5,'#f44336');grd.addColorStop(1,'#4a1010');
      ctx.fillStyle=grd;
    }
    ctx.beginPath();
    for(let k=0;k<8;k++){
      const a=(k/8)*Math.PI*2;
      const rr=m.r*(0.7+0.3*Math.sin(k*2.3+m.rot));
      k===0?ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
    }
    ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
    if(m.isPow){ctx.fillStyle='#fff';ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🛡',0,1);}
    ctx.restore();
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.alpha-=p.decay;
    if(p.alpha<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // Player
  if(alive||particles.length){
    ctx.save();ctx.translate(player.x,player.y);

    // Engine glow
    const trail=ctx.createRadialGradient(0,26,0,0,26,18);
    trail.addColorStop(0,'rgba(96,165,250,0.8)');trail.addColorStop(1,'rgba(96,165,250,0)');
    ctx.fillStyle=trail;
    ctx.beginPath();ctx.ellipse(0,26,7,15+Math.sin(frame*0.25)*4,0,0,Math.PI*2);ctx.fill();

    // Shield ring
    if(shield){
      ctx.strokeStyle=`rgba(0,229,255,${0.5+Math.sin(frame*0.12)*0.3})`;
      ctx.lineWidth=2.5;ctx.setLineDash([5,5]);
      ctx.beginPath();ctx.arc(0,0,player.r+11,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
    }

    // Ship
    const sg=ctx.createLinearGradient(0,-player.r,0,player.r);
    sg.addColorStop(0,'#e0e0ff');sg.addColorStop(1,'#7c3aed');
    ctx.fillStyle=sg;
    ctx.beginPath();
    ctx.moveTo(0,-player.r);
    ctx.lineTo(-player.r*0.6,player.r*0.5);
    ctx.lineTo(0,player.r*0.2);
    ctx.lineTo(player.r*0.6,player.r*0.5);
    ctx.closePath();ctx.fill();

    // Cockpit
    ctx.fillStyle='#00e5ff';ctx.globalAlpha=0.75;
    ctx.beginPath();ctx.ellipse(0,-player.r*0.2,5,7,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // HUD score
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();ctx.roundRect(W/2-65,12,130,36,18);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  ctx.fillText('⭐ '+Math.floor(score/10),W/2,34);

  // Shield badge
  if(shield){
    ctx.fillStyle='rgba(0,229,255,0.2)';
    ctx.beginPath();ctx.roundRect(10,12,95,32,16);ctx.fill();
    ctx.fillStyle='#00e5ff';ctx.font='bold 13px sans-serif';ctx.textAlign='left';
    ctx.fillText('🛡 ЗАЩИТА',18,32);
  }

  // Level
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='12px sans-serif';ctx.textAlign='right';
  ctx.fillText('LVL '+Math.floor(frame/290+1),W-12,34);

  // Hint
  if(frame<90&&alive){
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText('Двигай мышкой / пальцем',W/2,H-24);
  }

  // Game Over
  if(!alive){
    ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff2d55';ctx.font='bold 46px sans-serif';ctx.textAlign='center';
    ctx.fillText('💥 CRASH!',W/2,H/2-55);
    ctx.fillStyle='#fff';ctx.font='bold 26px sans-serif';
    ctx.fillText('Счёт: '+Math.floor(score/10),W/2,H/2);
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='16px sans-serif';
    ctx.fillText('Рекорд: '+bestScore,W/2,H/2+34);
    ctx.fillStyle='#ffd600';ctx.font='bold 18px sans-serif';
    ctx.fillText('Клик / тап — снова',W/2,H/2+72);
  }
}

loop();
</script>
</body>
</html>
